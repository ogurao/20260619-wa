<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>演習：ECサイト商品一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<div id="app">
  <div class="card" :class="{ soldout: stock === 0 }">
    <img :src="image" :alt="name">

    <h2>{{ name }}</h2>
    
    <p class="price" :style="{ color: priceColor }">
      ¥{{ price }}
    </p>

    <p>{{ description }}</p>

    <a :href="url" target="_blank">
      商品ページを見る
    </a>
    
    <button :disabled="stock === 0">
      カートに入れる
    </button>
  </div><!-- /.card -->
</div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
